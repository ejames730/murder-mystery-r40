<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shady Pines - File Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --accent-gold: #f59e0b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
            --gradient-gold: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.8;
            background-image:
                radial-gradient(circle at 10% 10%, rgba(245, 158, 11, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(239, 68, 68, 0.05) 0%, transparent 40%);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            gap: 0.5rem;
        }

        .back-btn:hover {
            background: #fff;
            color: var(--bg-dark);
            transform: translateX(-5px);
        }

        /* Markdown Styling */
        #content {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 4rem;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
        }

        #content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin-bottom: 2rem;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        #content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            color: var(--accent-gold);
            border-bottom: 1px solid rgba(245, 158, 11, 0.2);
            padding-bottom: 0.5rem;
        }

        #content h3 {
            font-size: 1.5rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: #fff;
        }

        #content p {
            margin-bottom: 1.5rem;
            font-size: 1.15rem;
            color: var(--text-main);
            opacity: 0.9;
        }

        #content ul,
        #content ol {
            margin-bottom: 2rem;
            padding-left: 1.5rem;
        }

        #content li {
            margin-bottom: 0.8rem;
            color: var(--text-dim);
        }

        #content blockquote {
            border-left: 4px solid var(--accent-gold);
            padding: 1.5rem 2rem;
            background: rgba(245, 158, 11, 0.05);
            margin: 2rem 0;
            font-style: italic;
            border-radius: 0 16px 16px 0;
        }

        #content table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        #content th {
            background: rgba(245, 158, 11, 0.1);
            text-align: left;
            padding: 1rem;
            color: var(--accent-gold);
        }

        #content td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        #content code {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-family: monospace;
            color: var(--accent-gold);
        }

        .loading-spinner {
            text-align: center;
            padding: 10rem 0;
            color: var(--text-dim);
            font-size: 1.5rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 2rem 1rem;
            }

            #content {
                padding: 2rem;
            }

            #content h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="nav-header">
            <a href="index.html" class="back-btn">&larr; Back to Dashboard</a>
        </div>

        <div id="content">
            <div class="loading-spinner">Decrypting files...</div>
        </div>
    </div>

    <script>
        const contentDiv = document.getElementById('content');
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');

        if (fileName) {
            fetch(fileName)
                .then(response => {
                    if (!response.ok) throw new Error('File not found');
                    return response.text();
                })
                .then(markdown => {
                    // Custom renderer to fix relative links inside markdown
                    const renderer = new marked.Renderer();
                    renderer.link = (href, title, text) => {
                        if (href.endsWith('.md')) {
                            return `<a href="reader.html?file=${href}">${text}</a>`;
                        }
                        return `<a href="${href}">${text}</a>`;
                    };

                    contentDiv.innerHTML = marked.parse(markdown, { renderer });
                    document.title = `Shady Pines - ${fileName.split('/').pop().replace('.md', '')}`;
                })
                .catch(err => {
                    contentDiv.innerHTML = `<h1>Error</h1><p>The requested file could not be found or read. Please check the path and try again.</p><p style="color:var(--accent-crimson)">${err.message}</p>`;
                });
        } else {
            contentDiv.innerHTML = `<h1>No File Specified</h1><p>Please select a file from the dashboard.</p>`;
        }
    </script>
</body>

</html>
